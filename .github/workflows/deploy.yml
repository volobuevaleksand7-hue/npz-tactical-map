name: Deploy to Vercel (production)

# Автодеплой оболочки сайта на Vercel при каждом push в main.
# Чисто-data пуши (data/**) пропускаем — карта читает их напрямую с GitHub raw,
# редеплой не нужен. Правки HTML/CSS/JS и регенерация news.html — деплоятся.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'

concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_CLI_VERSION: 55.0.0
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@${{ env.VERCEL_CLI_VERSION }}
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Validate prebuilt artifact
        run: bash scripts/verify-release-output.sh
      - name: Deploy candidate
        id: candidate
        run: |
          set -o pipefail
          deployment_url=$(vercel deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }} | tail -n 1)
          test -n "$deployment_url"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
      - name: Validate candidate
        env:
          VERCEL_DEPLOYMENT: ${{ steps.candidate.outputs.url }}
        run: bash scripts/verify-release-url.sh "${{ steps.candidate.outputs.url }}"
      - name: Promote verified candidate
        run: vercel promote "${{ steps.candidate.outputs.url }}" --yes --token=${{ secrets.VERCEL_TOKEN }}
