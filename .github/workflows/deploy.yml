name: Deploy to Vercel (production)

# Автодеплой оболочки сайта на Vercel при каждом push в main.
# Чисто-data пуши (data/**) пропускаем — карта читает их напрямую с GitHub raw,
# редеплой не нужен. Правки HTML/CSS/JS и регенерация news.html — деплоятся.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'

concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy (prebuilt) to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
